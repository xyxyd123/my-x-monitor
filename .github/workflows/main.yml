name: X-Final-Rescue
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 终极救援监控
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 换成这个专门为高频账号优化的源
          RSS_URL="https://nitter.net/FirstSquawk/rss"
          
          echo "正在从 Nitter 镜像站抓取..."
          XML=$(curl -sL --max-time 15 "$RSS_URL")
          
          # Nitter 的 XML 格式略有不同，我们换个提取方式
          CONTENT=$(echo "$XML" | grep -oP '(?<=<title>).*?(?=</title>)' | sed -n '2p')

          if [ -z "$CONTENT" ] || [ "$CONTENT" = "FirstSquawk" ]; then
            echo "❌ Nitter 也没抓到，尝试最后的 RSSHub 备弹..."
            CONTENT=$(curl -sL "https://rsshub.app/twitter/user/FirstSquawk?limit=1" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          fi

          if [ -z "$CONTENT" ]; then
            echo "⚠️ 全线告急，Twitter 接口可能在维护，请半小时后再试。"
            exit 0
          fi

          echo "✅ 抓取成功: $CONTENT"

          # 翻译与推送
          T_URL="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")"
          CN_TEXT=$(curl -sL "$T_URL" | python3 -c "import json, sys; print(json.loads(sys.stdin.read())[0][0][0])")
          
          FINAL_MSG="【速报】: $CN_TEXT \n\n 【原文】: $CONTENT"
          CLEAN_MSG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FINAL_MSG'''))")
          curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=FirstSquawk&desp=$CLEAN_MSG"
