name: X-Final-Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 监控翻译推送
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 1. 抓取内容 (多源尝试)
          CONTENT=$(curl -sL "https://hub.slarker.me/twitter/user/FirstSquawk?limit=1" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          if [ -z "$CONTENT" ]; then
            CONTENT=$(curl -sL "https://rsshub.rssforever.com/twitter/user/FirstSquawk?limit=1" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          fi
          
          # 2. 如果没抓到，直接退出
          if [ -z "$CONTENT" ]; then
            echo "No news found."
            exit 0
          fi
          
          echo "Found news: $CONTENT"
          
          # 3. 翻译
          # 用一个临时变量存翻译结果
          T_URL="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")"
          RESULT=$(curl -sL "$T_URL")
          CN_TEXT=$(python3 -c "import json, sys; print(json.loads(sys.stdin.read())[0][0][0])" <<< "$RESULT")
          
          echo "Translated: $CN_TEXT"
          
          # 4. 推送
          FINAL_MSG="【中文】: $CN_TEXT \n\n 【原文】: $CONTENT"
          CLEAN_MSG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FINAL_MSG'''))")
          
          curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=FirstSquawk&desp=$CLEAN_MSG"
