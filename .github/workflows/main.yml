name: Global-Finance-Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 金融突发新闻监控
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 换成 Investing.com 的突发新闻源，这个极其稳定
          RSS_URL="https://rsshub.rssforever.com/investing/news/breaking-news"
          
          echo "正在抓取全球金融突发新闻..."
          XML=$(curl -sL --max-time 15 "$RSS_URL")
          CONTENT=$(echo "$XML" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)

          if [ -z "$CONTENT" ]; then
            echo "❌ 还是抓不到。这说明是 RSSHub 节点本身的问题。"
            exit 0
          fi

          echo "✅ 抓取成功: $CONTENT"

          # 翻译处理
          T_URL="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")"
          CN_TEXT=$(curl -sL "$T_URL" | python3 -c "import json, sys; print(json.loads(sys.stdin.read())[0][0][0])")
          
          FINAL_MSG="【全球突发】: $CN_TEXT \n\n 【原文】: $CONTENT"
          CLEAN_MSG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FINAL_MSG'''))")
          curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=金融速报&desp=$CLEAN_MSG"
