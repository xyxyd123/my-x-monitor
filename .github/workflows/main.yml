name: X-Breaking-Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # 这样就改成了每 5 分钟运行一次

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 扫描并推送
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 1. 账号设置
          USER_ID="FaytuksNetwork"
          # 如果只想看突发，下面 URL 末尾可以加 ?filter=BREAKING
          RSS_URL="https://rsshub.rssforever.com/twitter/user/$USER_ID"
          
          echo "正在以最高频率检查 $USER_ID ..."
          
          # 2. 获取推文
          CONTENT=$(curl -sL "$RSS_URL" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          
          if [ -z "$CONTENT" ]; then
            echo "当前没有新内容"
            exit 0
          fi

          # 3. 翻译处理 (调用谷歌翻译)
          T_URL="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")"
          RESULT=$(curl -sL "$T_URL")
          CN_TEXT=$(python3 -c "import json, sys; print(json.loads(sys.stdin.read())[0][0][0])" <<< "$RESULT")
          
          # 4. 构造消息并推送
          FINAL_MSG="【中文翻译】: $CN_TEXT \n\n 【英文原文】: $CONTENT"
          PUSH_URL="https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=X监控提醒&desp=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FINAL_MSG'''))")"
          
          curl -s "$PUSH_URL"
          echo "频率：每分钟扫描已生效"
