name: X-Breaking-Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *' # 每分钟扫描一次

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检查 RSS 并推送
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          USER_ID="FaytuksNetwork"
          
          # 去掉了末尾的 filter，现在会抓取该账号的所有最新推文
          RSS_URL="https://rsshub.rssforever.com/twitter/user/$USER_ID"
          
          echo "正在检查账号: $USER_ID 的全部动态..."
          
          # 抓取最新一条内容
          RAW_CONTENT=$(curl -sL "$RSS_URL" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)

          if [ ! -z "$RAW_CONTENT" ]; then
            echo "当前最新动态: $RAW_CONTENT"
            
            # 编码处理
            CLEAN_CONTENT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$RAW_CONTENT'''))")
            
            # 推送到 PushDeer
            curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=X新动态&desp=$CLEAN_CONTENT"
            echo "推送已发出！"
          else
            echo "暂时没有抓取到任何内容，请检查 RSS 链接是否可用。"
          fi
