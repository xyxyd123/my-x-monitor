name: X-Breaking-Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 简单推送测试
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 1. 抓取最新推文
          # 先拿马斯克做测试，因为他发推快，容易出结果
          USER_ID="elonmusk"
          RSS_URL="https://rsshub.rssforever.com/twitter/user/$USER_ID"
          
          echo "正在检查 $USER_ID ..."
          
          # 获取推文标题
          CONTENT=$(curl -sL "$RSS_URL" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          
          if [ -z "$CONTENT" ]; then
            echo "没有内容，退出"
            exit 0
          fi

          echo "抓取成功: $CONTENT"

          # 2. 翻译 (直接使用极简方案)
          T_URL="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")"
          RESULT=$(curl -sL "$T_URL")
          CN_TEXT=$(python3 -c "import json, sys; print(json.loads(sys.stdin.read())[0][0][0])" <<< "$RESULT")
          
          echo "翻译成功: $CN_TEXT"

          # 3. 推送
          FINAL_MSG="【翻译】: $CN_TEXT \n\n 【原文】: $CONTENT"
          PUSH_URL="https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=监控提醒&desp=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FINAL_MSG'''))")"
          
          curl -s "$PUSH_URL"
          echo "推送流程结束"
