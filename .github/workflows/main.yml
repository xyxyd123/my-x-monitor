name: X-Simple-Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 纯消息推送测试
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          CONTENT=$(curl -sL "https://rsshub.rssforever.com/twitter/user/FirstSquawk?limit=1" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)
          [ -z "$CONTENT" ] && (echo "No content"; exit 0)
          echo "Content: $CONTENT"
          CLEAN_MSG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CONTENT'''))")
          curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=FirstSquawk&desp=$CLEAN_MSG"
