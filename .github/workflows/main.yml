name: X-Breaking-Monitor-With-Translation

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *' # 计划任务，由于GitHub限制，免费版实际约5分钟运行一次

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检查、翻译并推送
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: |
          # 设置监控账号
          USER_ID="FaytuksNetwork"
          
          # 获取全量推文（不加过滤，方便你测试）
          RSS_URL="https://rsshub.rssforever.com/twitter/user/$USER_ID"
          
          echo "正在抓取 $USER_ID 的动态..."
          
          # 1. 提取最新一条推文内容
          RAW_EN=$(curl -sL "$RSS_URL" | grep -oP '(?<=<title><!\[CDATA\[).*?(?=\]\]></title>)' | head -n 1)

          if [ ! -z "$RAW_EN" ]; then
            echo "抓到原文: $RAW_EN"
            
            # 2. 调用 Python 进行 Google 翻译 (英文 -> 中文)
            TRANSLATED_CN=$(python3 -c "
import urllib.parse, urllib.request, json
try:
    text = \"\"\"$RAW_EN\"\"\"
    url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=' + urllib.parse.quote(text)
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    with urllib.request.urlopen(req) as response:
        data = json.loads(response.read().decode('utf-8'))
        print(data[0][0][0])
except Exception as e:
    print('翻译失败，显示原文')
")
            
            # 3. 构造推送内容（包含中文和原文）
            # %0A 是换行符，让手机通知看起来更整齐
            FULL_MSG="【中文翻译】: $TRANSLATED_CN %0A%0A【英文原文】: $RAW_EN"
            
            # 对消息进行编码，防止特殊字符导致推送断掉
            CLEAN_CONTENT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FULL_MSG'''))")
            
            # 4. 执行 PushDeer 推送
            curl -s "https://api2.pushdeer.com/message/push?pushkey=$PUSHDEER_KEY&text=X新动态&desp=$CLEAN_CONTENT"
            echo "推送已发送到 PushDeer！"
          else
            echo "未抓取到内容，可能是RSSHub服务波动，请稍后再试。"
          fi
